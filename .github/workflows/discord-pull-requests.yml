name: Discord Pull Requests

on:
  pull_request:
    types: [opened, closed, reopened, synchronize, edited]

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_PULL_REQUESTS }}
          EVENT_ACTION: ${{ github.event.action }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          SENDER: ${{ github.event.sender.login }}
        run: |
          if [ "$PR_MERGED" = "true" ]; then
            LABEL="merged"
          elif [ "$EVENT_ACTION" = "synchronize" ] || [ "$EVENT_ACTION" = "edited" ]; then
            LABEL="updated"
          else
            LABEL="$EVENT_ACTION"
          fi
          MSG=$(printf '**PR %s: #%s**\n%s\n%s\n_by %s_' "$LABEL" "$PR_NUMBER" "$PR_TITLE" "$PR_URL" "$SENDER")
          jq -n --arg content "$MSG" '{content: $content}' \
          | curl -s -H "Content-Type: application/json" -d @- "$WEBHOOK_URL"
