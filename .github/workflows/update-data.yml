name: update

on:
  workflow_dispatch:
  schedule:
    # Runs at 03:00 UTC every day
    - cron: '0 3 * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PYTHONUNBUFFERED: 1

    steps:
      - name: Checkout scripts repo
        uses: actions/checkout@v4
        with:
          path: scripts-repo
          # Using your specific data repository
          repository: mdeguzis/proton-pulse-data
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout official ProtonDB data
        uses: actions/checkout@v4
        with:
          repository: bdefore/protondb-data
          path: official-data
          fetch-depth: 1

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install ijson

      - name: Cache ProtonDB Output
        uses: actions/cache@v4
        with:
          path: /tmp/protondb-output
          key: protondb-data-${{ github.run_id }}
          restore-keys: |
            protondb-data-

      - name: Process and Split Reports
        run: |
          mkdir -p /tmp/protondb-output
          # We point to official-data/reports where the JSON/Tarballs live
          python3 scripts-repo/scripts/split_reports.py \
            official-data/reports \
            /tmp/protondb-output

      - name: Copy processed data to repository
        run: |
          # Assuming you want the split data in a folder named 'data'
          mkdir -p scripts-repo/data
          cp -r /tmp/protondb-output/* scripts-repo/data/

      - name: Commit and Push changes
        working-directory: scripts-repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          # Only commit if there are actual changes to avoid workflow errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: ProtonDB split reports $(date +%F)" && git push)
