name: Update ProtonDB Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout Scripts
        uses: actions/checkout@v4

      - name: Checkout Official ProtonDB Data
        uses: actions/checkout@v4
        with:
          repository: bdefore/protondb-data
          path: official-data
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Process and Split Reports
        run: |
          mkdir -p /tmp/protondb-output
          uv run python scripts/split_reports.py \
            official-data/reports \
            /tmp/protondb-output

      - name: Deploy to gh-pages (orphan — no history)
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout --orphan gh-pages-new
          git rm -rf .
          cp -r /tmp/protondb-output/data .
          cp /tmp/protondb-output/index.html .
          git add data/ index.html
          git commit -m "Deploy: $(date +%F)"
          git push origin gh-pages-new:gh-pages --force
