name: Update ProtonDB Data

on:
  schedule:
    # Runs at 06:00 UTC every day
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Your Repo (scripts-repo)
        uses: actions/checkout@v4
        with:
          path: scripts-repo

      - name: Checkout Official ProtonDB Data
        uses: actions/checkout@v4
        with:
          repository: bdefore/protondb-data
          path: official-data
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ijson

      - name: Process and Split Reports
        run: |
          mkdir -p /tmp/protondb-output
          python3 scripts-repo/scripts/split_reports.py \
            official-data/reports \
            /tmp/protondb-output

      - name: Publish to gh-pages
        run: |
          cd /tmp/protondb-output
          git init
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages
          
          # Create a basic landing page to prevent 404 on the root URL
          cat <<EOF > index.html
          <!DOCTYPE html>
          <html>
          <head>
              <title>Proton Pulse Data Mirror</title>
              <style>
                  body { font-family: sans-serif; line-height: 1.6; padding: 2rem; background: #1a1a1a; color: #eee; }
                  code { background: #333; padding: 0.2rem 0.4rem; border-radius: 4px; }
                  a { color: #58a6ff; }
              </style>
          </head>
          <body>
              <h1>Proton Pulse Data Mirror</h1>
              <p>Status: <strong>Active</strong></p>
              <p>Last Sync: $(date -u)</p>
              <hr>
              <p>Data is available at <code>/data/{app_id}.json</code></p>
              <p>Example: <a href="data/730.json">Counter-Strike 2 (730)</a></p>
          </body>
          </html>
          EOF

          # Ensure GitHub doesn't ignore the data directory
          touch .nojekyll
          
          git add -A
          git commit -m "chore: active data sync $(date -u +%Y-%m-%d)"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push --force origin gh-pages
