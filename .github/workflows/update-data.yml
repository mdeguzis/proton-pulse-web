name: Update ProtonDB Data

on:
  schedule:
    # Run on the 2nd of each month
    - cron: '0 6 2 * *'
  workflow_dispatch:
    inputs:
      dump_url:
        description: 'Override dump URL (Leave blank for default)'
        required: false
        default: ''

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout scripts-repo
        uses: actions/checkout@v4
        with:
          path: scripts-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ijson

      - name: Prepare Download URL
        id: detect
        run: |
          URL="${{ github.event.inputs.dump_url }}"
          # Default to the bdefore historical dump if input is empty
          if [ -z "$URL" ]; then
            URL="https://github.com/bdefore/protondb-data/raw/master/reports/reports_piiremoved.json.gz"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Selected dump URL: $URL"

      - name: Download ProtonDB dump
        run: |
          echo "Downloading: ${{ steps.detect.outputs.url }}"
          curl -L --progress-bar \
            "${{ steps.detect.outputs.url }}" \
            -o /tmp/protondb-dump.json.gz

      - name: Split reports by game
        run: |
          mkdir -p /tmp/protondb-output
          python3 scripts-repo/scripts/split_reports.py \
            /tmp/protondb-dump.json.gz \
            /tmp/protondb-output

      - name: Publish to gh-pages
        run: |
          cd /tmp/protondb-output
          git init
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages
          touch .nojekyll
          git add -A
          git commit -m "chore: update ProtonDB data $(date -u +%Y-%m-%d)"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push --force origin gh-pages
