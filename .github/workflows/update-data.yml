name: Update ProtonDB Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout scripts repo
        uses: actions/checkout@v4
        with:
          path: scripts-repo
          repository: mdeguzis/proton-pulse-data
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout official ProtonDB data
        uses: actions/checkout@v4
        with:
          repository: bdefore/protondb-data
          path: official-data
          fetch-depth: 1

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install ijson

      - name: Process and Split Reports
        env:
          # Ensuring output is flushed immediately to show status counts
          PYTHONUNBUFFERED: "1"
        run: |
          mkdir -p /tmp/protondb-output
          # Run the script with the 'reports' subdirectory
          python3 scripts-repo/scripts/split_reports.py \
            official-data/reports \
            /tmp/protondb-output

      - name: Sync processed data
        run: |
          mkdir -p scripts-repo/data
          # Use rsync or cp to move files into the repo structure
          cp -rv /tmp/protondb-output/* scripts-repo/data/

      - name: Commit and Push changes
        working-directory: scripts-repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-update: ProtonDB split reports $(date +%F)"
            git push
          else
            echo "No changes to commit"
          fi
