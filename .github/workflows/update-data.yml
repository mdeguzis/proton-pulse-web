name: Update ProtonDB Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  build:
    runs-on: ubuntu-24.04
    outputs:
      has-changes: ${{ steps.check.outputs.has-changes }}
    steps:
      - name: Checkout Scripts
        uses: actions/checkout@v4
        with:
          path: scripts-repo

      - name: Checkout Official ProtonDB Data
        uses: actions/checkout@v4
        with:
          repository: bdefore/protondb-data
          path: official-data
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Prepare output directory
        run: mkdir -p /tmp/protondb-output

      - name: Restore app names cache
        uses: actions/cache@v5
        with:
          path: /tmp/protondb-output/app-names-cache.json
          key: app-names-${{ github.run_id }}
          restore-keys: app-names-

      - name: Process and Split Reports
        working-directory: scripts-repo
        run: |
          uv run python scripts/split_reports.py \
            ../official-data/reports \
            /tmp/protondb-output \
            --app-names-cache /tmp/protondb-output/app-names-cache.json

      - name: Sync processed data to scripts-repo
        run: |
          mkdir -p scripts-repo/data
          cp -rv /tmp/protondb-output/data/. scripts-repo/data/
          cp /tmp/protondb-output/index.html scripts-repo/index.html

      - name: Check for changes
        id: check
        working-directory: scripts-repo
        run: |
          git add data/ index.html
          if [ -n "$(git status --porcelain)" ]; then
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload build artifact
        if: steps.check.outputs.has-changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: site-content
          path: |
            scripts-repo/data/
            scripts-repo/index.html
          retention-days: 1

  report-build-status:
    needs: build
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: Build status
        run: |
          echo "### Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "✅ Build succeeded" >> "$GITHUB_STEP_SUMMARY"
            echo "Changes detected: **${{ needs.build.outputs.has-changes }}**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Build failed" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail if build failed
        if: needs.build.result != 'success'
        run: exit 1

  deploy:
    needs: build
    if: needs.build.outputs.has-changes == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-content
          path: artifact

      - name: Commit to main
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          cp -rv artifact/scripts-repo/data/. data/
          cp artifact/scripts-repo/index.html index.html
          git add data/ index.html
          git commit -m "Auto-update: ProtonDB split reports $(date +%F)"
          git pull --rebase origin main
          git push

      - name: Deploy to gh-pages
        run: |
          git checkout --orphan gh-pages-tmp
          git rm -rf .
          git checkout main -- data/ index.html
          git add data/ index.html
          git commit -m "Deploy: $(date +%F)"
          git push origin gh-pages-tmp:gh-pages --force
