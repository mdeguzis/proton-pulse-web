name: Discord Releases

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_RELEASES }}
          TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          SENDER: ${{ github.event.sender.login }}
        run: |
          MSG=$(printf '**New release: %s**\n%s\n%s\n_by %s_' "$TAG" "$RELEASE_NAME" "$RELEASE_URL" "$SENDER")
          jq -n --arg content "$MSG" '{content: $content}' \
          | curl -s -H "Content-Type: application/json" -d @- "$WEBHOOK_URL"
