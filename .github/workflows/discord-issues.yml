name: Discord Issues

on:
  issues:
    types: [opened, closed, reopened]

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_ISSUES }}
          EVENT_ACTION: ${{ github.event.action }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          SENDER: ${{ github.event.sender.login }}
        run: |
          MSG=$(printf '**Issue %s: #%s**\n%s\n%s\n_by %s_' "$EVENT_ACTION" "$ISSUE_NUMBER" "$ISSUE_TITLE" "$ISSUE_URL" "$SENDER")
          jq -n --arg content "$MSG" '{content: $content}' \
          | curl -s -H "Content-Type: application/json" -d @- "$WEBHOOK_URL"
