name: Retry pages-build-deployment

# GitHub's built-in Pages deploy (pages-build-deployment) is opaque and can't
# be edited; when it flakes the only recourse is a manual rerun. This watcher
# fires whenever that workflow completes, and if the conclusion is failure AND
# we haven't already retried this run (attempt == 1), it kicks a rerun via the
# gh CLI. Caps at one retry so a permanently broken deploy isn't hammered.

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: [completed]

jobs:
  rerun-on-failure:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt == 1
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: read
    steps:
      - name: Rerun failed jobs
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          echo "Retrying pages-build-deployment run $RUN_ID (attempt=${{ github.event.workflow_run.run_attempt }})"
          gh run rerun "$RUN_ID" --failed --repo "${{ github.repository }}"
