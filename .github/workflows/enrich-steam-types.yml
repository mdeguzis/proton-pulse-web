name: Enrich Steam Types

# Standalone runner for scripts/pipeline/steam_type.py against gh-pages.
# Bypasses the full finalize pipeline (which has been hanging on unrelated
# enrichers, #258) so the DLC / Mod / Software / Demo filter always has
# fresh data even when finalize is having a rough day.
#
# Runs the type enricher directly against gh-pages/search-index.json,
# then commits the result back. Each run enriches at most PROBE_CAP
# (~200) new Steam apps, so the coverage grows a bit per run. Cache is
# persisted in gh-pages so subsequent runs skip already-typed apps.

on:
  schedule:
    # Every 6 hours -- Steam appdetails rate limit resets after ~5 min,
    # so we could go faster, but 6h keeps churn low and still fills the
    # long tail over a couple of days.
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      cycles:
        description: "How many enrichment cycles to run per dispatch (1 cycle ~= 200 apps, ~5 min rate-limit wait between)."
        required: false
        default: "1"

permissions:
  contents: write

concurrency:
  group: enrich-steam-types
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout repo (for the script)
        uses: actions/checkout@v4
        with:
          path: repo
          persist-credentials: false

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run enricher against gh-pages/search-index.json
        working-directory: repo
        env:
          CYCLES: ${{ github.event.inputs.cycles || '1' }}
        run: |
          # Loop N enrichment cycles inside one dispatch. Each cycle
          # enriches up to PROBE_CAP (~200) apps, then we sleep for 5
          # minutes so Steam's ~200-req/5min soft-throttle resets before
          # the next cycle. Column indices: row[11] is where the type
          # lands (steam_type.py writes to index 11 = 12th column).
          for i in $(seq 1 "$CYCLES"); do
            echo "=== enrichment cycle $i of $CYCLES ==="
            python -c "
          from pathlib import Path
          from scripts.pipeline.steam_type import enrich_search_index_with_steam_type
          enrich_search_index_with_steam_type(Path('${GITHUB_WORKSPACE}/gh-pages'))
          "
            python -c "
          import json
          rows = json.load(open('${GITHUB_WORKSPACE}/gh-pages/search-index.json'))
          from collections import Counter
          c = Counter()
          for r in rows:
              t = r[11] if len(r) > 11 else None
              c[t] += 1
          print('total rows:', len(rows))
          for t, n in c.most_common():
              print(f'  {t!r}: {n}')
          "
            if [ "$i" -lt "$CYCLES" ]; then
              echo "sleeping 300s so Steam rate-limit resets before next cycle..."
              sleep 300
            fi
          done

      - name: Commit + push if changed
        working-directory: gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add search-index.json steam-type-cache.json
          if git diff --cached --quiet; then
            echo "no change, skipping push"
            exit 0
          fi
          git commit -m "chore(enrich): refresh Steam type column in search-index.json"
          # Rebase-then-push handles the edge-fn-health workflow racing us
          # on edge-status.json. A retry loop covers rare cases where
          # another push lands between our fetch and our push.
          for i in 1 2 3; do
            if git pull --rebase origin gh-pages && git push origin gh-pages; then
              exit 0
            fi
            echo "push race attempt $i, retrying"
            sleep 3
          done
          echo "push retries exhausted"
          exit 1
