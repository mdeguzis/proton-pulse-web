name: Sync gh-pages to staging repo

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * *'  # daily at 04:00 UTC -- catches any direct commits to staging repo

jobs:
  sync:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync gh-pages to staging repo
        env:
          GH_TOKEN: ${{ secrets.STAGING_DEPLOY_TOKEN }}
        run: |
          gh repo sync mdeguzis/proton-pulse-web-staging \
            --source mdeguzis/proton-pulse-web \
            --branch gh-pages \
            --force
