name: Cert Monitor

# Reads the TLS certificate served on the live site (www.proton-pulse.com) every
# 6 hours and writes cert-status.json + cert-history.json to gh-pages (#359).
# Post-#362 the site is on Cloudflare Pages so this is the single CF-managed
# cert -- there is no more separate origin cert to worry about. The burndown
# graph still lives on the status page and is fed from these files.
#
# Why gh-pages is still the destination: the main pipeline (update-data.yml)
# handles publishing to Cloudflare Pages, and its publish-cloudflare.sh copies
# cert-status.json + cert-history.json from gh-pages into the CF Pages deploy.
# Keeping this workflow's writes on gh-pages means the append-only history
# survives every pipeline run without a separate R2 upload path here.
#
# No secret: the cert is read with a plain public openssl handshake, and the
# commit uses the built-in GITHUB_TOKEN. There is no PAT to store or rotate.

on:
  schedule:
    # Every 6 hours. The cert only changes on renewal (~every 60-90 days), so a
    # tight cadence buys nothing; 4x/day keeps days-remaining fresh and the
    # burndown graph smooth.
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cert-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (for the script)
        uses: actions/checkout@v4
        with:
          path: repo
          persist-credentials: false

      - name: Checkout gh-pages (destination)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          persist-credentials: true

      - name: Read the served cert + append history
        run: |
          bash repo/scripts/cert-monitor.sh gh-pages/cert-status.json gh-pages/cert-history.json
          cat gh-pages/cert-status.json

      - name: Commit + push if changed
        working-directory: gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cert-status.json cert-history.json
          if git diff --cached --quiet; then
            echo "no change, skipping push"
            exit 0
          fi
          git commit -m "chore(status): refresh cert-status.json + cert-history.json"
          git push origin gh-pages
